# ─────────────────────────────────────────────────────────────────────────────
# Graphiti MCP — Trident Phase 8b (via getzep/graphiti official container)
#
# This runs the Graphiti MCP server standalone against an EXISTING FalkorDB instance.
# Does NOT spin up a new FalkorDB — connects to your memory-falkordb:6379
#
# Prerequisites (must already be running):
#   - traefik_proxy network (external)
#   - memory-falkordb on :6379 (Redis-compatible graph DB)
#   - memory-qdrant on :6333 (vector DB, optional but encouraged)
#
# Sources:
#   - Official: https://github.com/getzep/graphiti
#   - Container: zepai/knowledge-graph-mcp (pre-built)
#   - Docs: https://github.com/getzep/graphiti/blob/main/mcp_server/README.md
#
# Deploy:
#   OPENAI_API_KEY=sk-xxx docker compose -f docker-compose-graphiti.yml up -d
#
# Or from GitHub:
#   OPENAI_API_KEY=sk-xxx docker compose \
#     -f https://raw.githubusercontent.com/ShivaClaw/shiva-memory/main/infra/docker-compose-graphiti.yml \
#     up -d
# ─────────────────────────────────────────────────────────────────────────────

services:

  graphiti:
    image: zepai/knowledge-graph-mcp:latest
    container_name: memory-graphiti
    restart: unless-stopped
    pull_policy: always

    environment:
      # ── Required: LLM provider API key ──────────────────────────────────────
      OPENAI_API_KEY: ${OPENAI_API_KEY}

      # ── Database: Connect to existing memory-falkordb ───────────────────────
      # Graphiti will use FalkorDB's graph module (Redis protocol)
      FALKORDB_URI: redis://memory-falkordb:6379
      FALKORDB_PASSWORD: ""  # Set if password-protected
      FALKORDB_DATABASE: "default_db"

      # ── Server config ───────────────────────────────────────────────────────
      # HTTP transport on :8000 (/mcp/ endpoint)
      GRAPHITI_TRANSPORT: "http"
      GRAPHITI_PORT: "8000"
      GRAPHITI_LOG_LEVEL: "INFO"
      # Optional: namespace graph data (useful for multi-tenant)
      GRAPHITI_GROUP_ID: "main"
      # Optional: concurrency limit (default 10, tune per LLM tier)
      SEMAPHORE_LIMIT: "5"
      # Disable telemetry if desired
      GRAPHITI_TELEMETRY_ENABLED: "false"

      # ── LLM & Embeddings (defaults shown, optional overrides) ────────────────
      # Default model is gpt-5-mini (for speed), can override:
      # MODEL_NAME: "gpt-4.1"
      # EMBEDDER_PROVIDER: "openai"  # or "sentence_transformers" (local)

    volumes:
      # Persists Graphiti's local state (queue, metadata)
      - graphiti_data:/home/user/graphiti/data

    networks:
      - traefik_proxy

    labels:
      # ── Traefik HTTPS routing ──────────────────────────────────────────────
      - "traefik.enable=true"
      - "traefik.http.routers.graphiti.rule=Host(`${GRAPHITI_DOMAIN:-graphiti.clawofshiva.tech}`)"
      - "traefik.http.routers.graphiti.entrypoints=websecure"
      - "traefik.http.routers.graphiti.tls.certresolver=letsencrypt"
      - "traefik.http.services.graphiti.loadbalancer.server.port=8000"

      # ── Optional: Basic auth middleware ────────────────────────────────────
      # Create secret: echo $(htpasswd -nb admin PASSWORD) | docker secret create graphiti_auth -
      # Uncomment if you create the secret:
      # - "traefik.http.routers.graphiti.middlewares=graphiti-auth"
      # - "traefik.http.middlewares.graphiti-auth.basicauth.usersfile=/run/secrets/graphiti_auth"

    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

    ports:
      # Internal-only, routed via Traefik
      - "127.0.0.1:8000:8000"

volumes:
  graphiti_data:
    driver: local
    driver_opts:
      type: none
      o: bind
      device: /data/graphiti

networks:
  traefik_proxy:
    external: true

# ─────────────────────────────────────────────────────────────────────────────
# USAGE
# ─────────────────────────────────────────────────────────────────────────────
#
# Post-deploy checks:
#   docker logs -f memory-graphiti
#   curl http://localhost:8000/health
#   curl https://graphiti.clawofshiva.tech/health
#   curl https://graphiti.clawofshiva.tech/mcp/
#
# MCP endpoint (for mcporter / OpenClaw integration):
#   https://graphiti.clawofshiva.tech/mcp/
#
# FalkorDB connectivity check:
#   python3 -c "
#   import redis
#   r = redis.Redis(host='memory-falkordb', port=6379, decode_responses=True)
#   print('Redis PING:', r.ping())
#   print('Graphs:', r.execute_command('GRAPH.LIST'))
#   "
#
# Sending episodes (text → entity graph):
#   curl -X POST https://graphiti.clawofshiva.tech/mcp/ \
#     -H 'Content-Type: application/json' \
#     -d '{
#       "jsonrpc": "2.0",
#       "method": "tools/call",
#       "params": {
#         "name": "add_episode",
#         "arguments": {
#           "name": "My Conversation",
#           "episode_body": "G said he wants to pivot to biotech...",
#           "source": "text"
#         }
#       },
#       "id": 1
#     }'
#
# ─────────────────────────────────────────────────────────────────────────────
# TROUBLESHOOTING
# ─────────────────────────────────────────────────────────────────────────────
#
# Image pull fails (zepai/knowledge-graph-mcp not found):
#   → Pre-built image may not exist. Fall back to building from source:
#     git clone https://github.com/getzep/graphiti.git
#     cd graphiti/mcp_server
#     docker build -t my-graphiti:latest .
#     Update this compose to use "image: my-graphiti:latest"
#
# FalkorDB connection refused (memory-falkordb:6379):
#   → Verify FalkorDB is running: docker ps | grep falkordb
#   → Verify network: docker network inspect traefik_proxy
#   → Test: docker exec memory-graphiti redis-cli -h memory-falkordb ping
#
# Traefik not routing (HTTPS cert failures):
#   → Verify domain resolves: nslookup graphiti.clawofshiva.tech
#   → Check Traefik logs: docker logs -f traefik
#   → Cert resolver "letsencrypt" must exist in traefik config
#
# 429 rate limit errors (LLM provider throttling):
#   → Reduce SEMAPHORE_LIMIT env var (try 2-3 for free tier)
#   → Monitor logs: docker logs -f memory-graphiti
# ─────────────────────────────────────────────────────────────────────────────
