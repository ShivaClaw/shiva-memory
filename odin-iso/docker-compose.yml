version: '3.8'

services:
  openclaw:
    image: openclaw/openclaw:latest
    container_name: openclaw-odin
    ports:
      - "3000:3000"
      - "8080:8080"
    volumes:
      - /home/boss/odin/workspace:/data/.openclaw/workspace
    environment:
      - NODE_ENV=production
    restart: unless-stopped
    networks:
      - odin-network

  ollama:
    image: ollama/ollama:latest
    container_name: ollama-odin
    ports:
      - "11434:11434"
    volumes:
      - /home/boss/odin/ollama:/root/.ollama
    restart: unless-stopped
    networks:
      - odin-network

  qdrant:
    image: qdrant/qdrant:latest
    container_name: qdrant-odin
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - /home/boss/odin/qdrant:/qdrant/storage
    restart: unless-stopped
    networks:
      - odin-network

  falkordb:
    image: falkordb/falkordb:latest
    container_name: falkordb-odin
    ports:
      - "6379:6379"
    volumes:
      - /home/boss/odin/falkordb:/data
    restart: unless-stopped
    networks:
      - odin-network

  jupyter:
    image: jupyter/base-notebook:latest
    container_name: jupyter-odin
    ports:
      - "8888:8888"
    volumes:
      - /home/boss/odin/workspace:/home/jovyan/work
    environment:
      - JUPYTER_ENABLE_LAB=yes
      - JUPYTER_TOKEN=odin-jupyter-2026
    restart: unless-stopped
    networks:
      - odin-network

networks:
  odin-network:
    driver: bridge
